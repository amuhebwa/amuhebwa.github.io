resume_header_intro: "<p>Hello! My name is Aggrey Muhebwa and I am a second year Ph.D. student in Electrical and Computer Engineering at
University of Massachusetts - Amherst. I am advised by prof. Jay Taneja.</p>
<p>I completed my masters degree in Electrical and Computer Engineering from Carnegie Mellon University and a bachelors degree in Computer Engineering 
from Makerere University in Uganda. </p>
<p>I am interested in creating systems that combine satellite data, deep learning and computer vision in order to measure and understand the 
performance of natural and build infrastructure in the developing world.
I also apply general machine learning and statistical techniques to analyze and understand the impact of infrastructure on
socio-economic development of developing countries with a major focus on Sub-Saharan Africa.
. </p>"

